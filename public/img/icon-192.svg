<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" role="img" aria-label="TOTP Generator">
  <defs>
    <linearGradient id="bg" x1="36" y1="28" x2="156" y2="168" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B7CFF"/>
      <stop offset="0.52" stop-color="#6355FF"/>
      <stop offset="1" stop-color="#2EE6C5"/>
    </linearGradient>
    <linearGradient id="sheen" x1="96" y1="24" x2="96" y2="110" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#6355FF" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="192" height="192" rx="44" fill="#070B14"/>
  <rect x="16" y="16" width="160" height="160" rx="38" fill="url(#bg)" filter="url(#soft)"/>
  <rect x="16" y="16" width="160" height="160" rx="38" fill="url(#sheen)"/>

  <!-- timer ring -->
  <circle cx="96" cy="96" r="46" fill="none" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="8"/>
  <path d="M96 50 A46 46 0 1 1 58.5 130" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>

  <!-- lock -->
  <rect x="70" y="92" width="52" height="40" rx="9" fill="#FFFFFF"/>
  <path d="M80 92 V80 a16 16 0 0 1 32 0 v12" fill="none" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round"/>
  <circle cx="96" cy="108" r="5" fill="#6355FF"/>
  <rect x="93.5" y="110" width="5" height="11" rx="2" fill="#6355FF"/>
</svg>
